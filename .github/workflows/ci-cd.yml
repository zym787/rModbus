name: CI/CD

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

jobs:
  check:
    name: Static Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt
      - name: Check format
        run: cargo fmt --check
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Build
        run: cargo build --release
      - name: Run tests
        run: cargo test --all

  release:
    name: Release
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
        arch:
          - x86_64
          - aarch64
        exclude:
          - os: windows-latest
            arch: aarch64
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.arch }}-${{ matrix.os == 'windows-latest' && 'pc-windows-msvc' || matrix.os == 'ubuntu-latest' && 'unknown-linux-gnu' || 'apple-darwin' }}
      - name: Build CLI
        run: cargo build --release --bin rustrrrrrrr --target ${{ matrix.arch }}-${{ matrix.os == 'windows-latest' && 'pc-windows-msvc' || matrix.os == 'ubuntu-latest' && 'unknown-linux-gnu' || 'apple-darwin' }}
      - name: Build GUI
        run: cargo build --release --bin rustrrrrrrr-gui --target ${{ matrix.arch }}-${{ matrix.os == 'windows-latest' && 'pc-windows-msvc' || matrix.os == 'ubuntu-latest' && 'unknown-linux-gnu' || 'apple-darwin' }}
      - name: Prepare artifacts
        run: |
          mkdir -p release
          cp target/${{ matrix.arch }}-${{ matrix.os == 'windows-latest' && 'pc-windows-msvc' || matrix.os == 'ubuntu-latest' && 'unknown-linux-gnu' || 'apple-darwin' }}/release/rustrrrrrrr* release/ 2>/dev/null || true
          cp config.json release/ 2>/dev/null || true
          cp register_config.json release/ 2>/dev/null || true
        shell: bash
      - name: Create zip archive
        run: |
          cd release
          zip -r ../rustrrrrrrr-${{ matrix.os }}-${{ matrix.arch }}.zip .
        shell: bash
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustrrrrrrr-${{ matrix.os }}-${{ matrix.arch }}
          path: rustrrrrrrr-${{ matrix.os }}-${{ matrix.arch }}.zip
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: rustrrrrrrr-${{ matrix.os }}-${{ matrix.arch }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
