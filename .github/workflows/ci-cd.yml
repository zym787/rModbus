name: CI/CD

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  check:
    name: Static Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt
      - name: Check format
        run: cargo fmt --check
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Build
        run: cargo build --release
      - name: Run tests
        run: cargo test --all

  release:
    name: Release
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: rustrrrrrrr.exe
            gui_artifact_name: rustrrrrrrr-gui.exe
          - os: windows-latest
            target: i686-pc-windows-msvc
            artifact_name: rustrrrrrrr-i686.exe
            gui_artifact_name: rustrrrrrrr-gui-i686.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: rustrrrrrrr
            gui_artifact_name: rustrrrrrrr-gui
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: rustrrrrrrr-aarch64
            gui_artifact_name: rustrrrrrrr-gui-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: rustrrrrrrr
            gui_artifact_name: rustrrrrrrr-gui
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: rustrrrrrrr-aarch64
            gui_artifact_name: rustrrrrrrr-gui-aarch64
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
      - name: Build CLI
        run: cargo build --release --bin rustrrrrrrr --target ${{ matrix.target }}
      - name: Build GUI
        run: cargo build --release --bin rustrrrrrrr-gui --target ${{ matrix.target }}
      - name: Prepare artifacts
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/rustrrrrrrr* release/
          cp config.json release/ 2>/dev/null || true
          cp register_config.json release/ 2>/dev/null || true
      - name: Create zip archive
        run: |
          cd release
          zip -r ../rustrrrrrrr-${{ matrix.target }}.zip .
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustrrrrrrr-${{ matrix.target }}
          path: rustrrrrrrr-${{ matrix.target }}.zip
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: rustrrrrrrr-${{ matrix.target }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
